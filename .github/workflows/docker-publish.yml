name: Build and publish image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]   # publishing a GitHub Release creates the tag and drives the build
  workflow_dispatch:

jobs:
  # Hand-calculated unit tests (vitest) via the Dockerfile `test` stage. Runs on
  # every PR and push so numeric accuracy gates merges; build-push needs it green.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker build --target test -t ngrid-dashboard-test ./app

      - name: Run unit tests
        run: docker run --rm ngrid-dashboard-test

  # Static analysis: ESLint (next/core-web-vitals) + a TypeScript typecheck
  # (tsc --noEmit). Runs on every PR + push; gates the publish.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: cd app && npm ci

      - name: Generate Prisma client (types for the typecheck)
        run: cd app && npx prisma generate

      # Surface ESLint findings as GitHub annotations (inline on changed lines)
      # via a self-contained problem matcher — no external action, no SARIF.
      - name: Register ESLint problem matcher
        run: echo "::add-matcher::.github/eslint-compact-matcher.json"

      - name: ESLint
        # Compact formatter so the matcher can parse each finding. next lint emits
        # absolute paths; rewrite them to workspace-relative so annotations land on
        # the right file/line in the diff. Preserve eslint's exit code (still fails
        # on ERRORS, passes on warnings) via PIPESTATUS — no --max-warnings added.
        shell: bash
        run: |
          cd app
          npm run lint -- --format compact \
            | sed "s#${GITHUB_WORKSPACE}/##g"
          exit "${PIPESTATUS[0]}"

      - name: Remove ESLint problem matcher
        if: always()
        run: echo "::remove-matcher owner=eslint-compact::"

      - name: Typecheck
        run: cd app && npx tsc --noEmit

  # Upgrade-safety: applying the current schema on top of the PREVIOUS release's
  # database must not clobber data. The deploy entrypoint uses `prisma db push
  # --accept-data-loss` with no rollback, so a destructive schema change would
  # silently delete production rows. This seeds the old schema and upgrades.
  migration-safety:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ngrid
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ngrid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ngrid" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ngrid:ci@localhost:5432/ngrid
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags to resolve the previous release schema

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install prisma CLI
        run: cd app && npm install --no-audit --no-fund

      - name: Resolve previous release schema
        id: prev
        run: |
          PREV=$(git tag -l 'v*' --sort=-v:refname | grep -vx "${GITHUB_REF_NAME}" | head -1 || true)
          if [ -z "$PREV" ]; then
            echo "No prior release tag — skipping (nothing to upgrade from)."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "Previous release: $PREV"
            git show "$PREV:app/prisma/schema.prisma" > /tmp/old.prisma
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify upgrade preserves data
        if: steps.prev.outputs.skip == '0'
        env:
          OLD_SCHEMA: /tmp/old.prisma
          NEW_SCHEMA: app/prisma/schema.prisma
        run: bash .github/migration-safety/check.sh

  # Boot-health smoke test: build the runner image exactly as it ships, boot it
  # against a throwaway Postgres (the real entrypoint runs `prisma db push`), seed
  # representative data, and assert the app comes up HEALTHY (/api/overview serves
  # real data). Catches a change that breaks startup/DB/queries BEFORE it becomes
  # :edge (staging) or :latest. Runs on PRs + main; gates the publish.
  smoke-boot:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ngrid
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ngrid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ngrid" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ngrid:ci@localhost:5432/ngrid?schema=public
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags so the build can stamp a git-describe version

      - uses: docker/setup-buildx-action@v3

      - name: Build the runner image (as shipped)
        # Stamp the same git-describe version the real edge/main build uses, so the
        # boot-health summary shows a meaningful version (not 0.0.0-dev).
        run: |
          ver="$(git describe --tags --always | sed 's/^v//')"
          docker build --build-arg APP_VERSION="$ver" -t ngrid-dashboard-boot ./app

      - name: Boot the image
        run: |
          docker run -d --name boot --network host \
            -e DATABASE_URL="postgresql://ngrid:ci@localhost:5432/ngrid?schema=public" \
            -e SCHEDULER_ENABLED=false \
            -e NGRID_USER=ci@example.com -e NGRID_PASS=ci \
            ngrid-dashboard-boot

      - name: Wait for the server (entrypoint runs db push, then starts Next)
        run: |
          start=$(date +%s)
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:3000/; then
              waited=$(( $(date +%s) - start ))
              echo "server up after ${waited}s"
              echo "BOOT_WAIT_SECONDS=${waited}" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 3
          done
          echo "BOOT_WAIT_SECONDS=timeout" >> "$GITHUB_ENV"
          echo "::error::server never started (root / not 200)"; docker logs boot | tail -80; exit 1

      - name: Seed representative data
        # Strip the Prisma-only ?schema=public param — libpq/psql rejects it.
        run: psql "${DATABASE_URL%%\?*}" -v ON_ERROR_STOP=1 -f .github/migration-safety/seed.sql

      - name: Assert /api/overview is healthy and serves data
        id: assert
        run: |
          out="$(curl -s -o /tmp/ov.json -m 30 -w '%{http_code} %{time_total}' http://localhost:3000/api/overview)"
          set -- $out; code="$1"; rt="$2"
          echo "HTTP $code (${rt}s)"; cat /tmp/ov.json | head -c 400; echo
          # Stash facts for the step summary (consumed by the always() summary step).
          echo "OV_HTTP_CODE=${code}" >> "$GITHUB_ENV"
          echo "OV_RESPONSE_SECONDS=${rt}" >> "$GITHUB_ENV"
          if [ "$code" != "200" ]; then
            echo "OV_BILL_COUNT=n/a" >> "$GITHUB_ENV"
            echo "::error::/api/overview returned $code (app not healthy)"; docker logs boot | tail -80; exit 1
          fi
          bills="$(python3 -c 'import json;print(json.load(open("/tmp/ov.json")).get("billCount",0))')"
          echo "OV_BILL_COUNT=${bills}" >> "$GITHUB_ENV"
          if [ "${bills:-0}" -lt 1 ]; then
            echo "::error::/api/overview returned 200 but no data (billCount=$bills) — DB/query path unhealthy"; docker logs boot | tail -80; exit 1
          fi
          echo "healthy: /api/overview 200 with billCount=$bills"

      - name: Boot-health summary
        if: always()
        env:
          # steps.assert.outcome is 'success' only if the assert step passed; any
          # earlier failure (build/boot/wait) leaves it '' — treat that as a fail.
          ASSERT_OUTCOME: ${{ steps.assert.outcome }}
        run: |
          # Read the git-describe version stamped into package.json at build (the
          # build step passes --build-arg APP_VERSION; the Dockerfile npm-pkg-sets it
          # and copies package.json into the runner stage). Falls back to "unknown"
          # if the container never came up.
          ver="$(docker exec boot node -p "require('/app/package.json').version" 2>/dev/null || true)"
          [ -n "$ver" ] || ver="unknown"
          if [ "$ASSERT_OUTCOME" = "success" ]; then
            status="✓ healthy"
          else
            status="✗ unhealthy"
          fi
          {
            echo "## Boot-health smoke test"
            echo ""
            echo "**${status}**"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| App version | \`${ver}\` |"
            echo "| \`/api/overview\` HTTP | \`${OV_HTTP_CODE:-n/a}\` |"
            echo "| billCount | \`${OV_BILL_COUNT:-n/a}\` |"
            echo "| Boot wait (s) | \`${BOOT_WAIT_SECONDS:-n/a}\` |"
            echo "| \`/api/overview\` response (s) | \`${OV_RESPONSE_SECONDS:-n/a}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Container logs (always)
        if: always()
        run: docker logs boot 2>&1 | tail -60 || true

      - name: Cleanup
        if: always()
        run: docker rm -f boot || true

  build-push:
    # Gate the image publish on tests, the upgrade-safety check, AND the boot-health
    # smoke test passing. PRs only run the test + migration-safety + smoke-boot jobs
    # above (no publish — no secrets, and forks can't push to GHCR).
    needs: [test, lint, migration-safety, smoke-boot]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags so `git describe` can version edge builds

      - uses: docker/setup-buildx-action@v3

      - name: Resolve app version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            v="${{ github.event.release.tag_name }}"; v="${v#v}"   # release vX.Y.Z -> X.Y.Z
          else
            # main / edge build: git describe from the most recent release tag,
            # e.g. v0.24.0-3-gabc1234 -> 0.24.0-3-gabc1234 (valid npm semver prerelease).
            v="$(git describe --tags --always | sed 's/^v//')"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$v"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ngrid-dashboard
          # Publishing a GitHub Release (tag vX.Y.Z) publishes X.Y.Z, X.Y, X and moves
          # :latest. Pushes to main publish :edge only. Every build gets a :sha-xxxxxxx tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # :latest tracks the newest non-prerelease RELEASE only — never a main/edge build.
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=edge,branch=main
            type=sha,format=short
          # Disable the implicit auto-latest; we control :latest explicitly above.
          flavor: |
            latest=false

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
