name: Build and publish image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]   # publishing a GitHub Release creates the tag and drives the build
  workflow_dispatch:

jobs:
  # Hand-calculated unit tests (vitest) via the Dockerfile `test` stage. Runs on
  # every PR and push so numeric accuracy gates merges; build-push needs it green.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker build --target test -t ngrid-dashboard-test ./app

      - name: Run unit tests
        run: docker run --rm ngrid-dashboard-test

  build-push:
    # Gate the image publish on tests passing. PRs only run the test job above
    # (no publish — no secrets, and forks can't push to GHCR).
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve app version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            v="${{ github.event.release.tag_name }}"; v="${v#v}"   # release vX.Y.Z -> X.Y.Z
          else
            v="0.0.0-edge.${GITHUB_SHA::7}"                         # main / edge build
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$v"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ngrid-dashboard
          # Publishing a GitHub Release (tag vX.Y.Z) publishes X.Y.Z, X.Y, X and moves
          # :latest. Pushes to main publish :edge only. Every build gets a :sha-xxxxxxx tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # :latest tracks the newest non-prerelease RELEASE only — never a main/edge build.
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=edge,branch=main
            type=sha,format=short
          # Disable the implicit auto-latest; we control :latest explicitly above.
          flavor: |
            latest=false

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
