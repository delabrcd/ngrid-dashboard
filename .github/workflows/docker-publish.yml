name: Build and publish image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]   # publishing a GitHub Release creates the tag and drives the build
  workflow_dispatch:

jobs:
  # Hand-calculated unit tests (vitest) via the Dockerfile `test` stage. Runs on
  # every PR and push so numeric accuracy gates merges; build-push needs it green.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: docker build --target test -t ngrid-dashboard-test ./app

      - name: Run unit tests
        run: docker run --rm ngrid-dashboard-test

  # Static analysis: ESLint (next/core-web-vitals) + a TypeScript typecheck
  # (tsc --noEmit). Runs on every PR + push; gates the publish.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: cd app && npm ci

      - name: Generate Prisma client (types for the typecheck)
        run: cd app && npx prisma generate

      # Surface ESLint findings as GitHub annotations (inline on changed lines)
      # via a self-contained problem matcher — no external action, no SARIF.
      - name: Register ESLint problem matcher
        run: echo "::add-matcher::.github/eslint-compact-matcher.json"

      - name: ESLint
        # Compact formatter so the matcher can parse each finding. next lint emits
        # absolute paths; rewrite them to workspace-relative so annotations land on
        # the right file/line in the diff. Preserve eslint's exit code (still fails
        # on ERRORS, passes on warnings) via PIPESTATUS — no --max-warnings added.
        shell: bash
        run: |
          cd app
          npm run lint -- --format compact \
            | sed "s#${GITHUB_WORKSPACE}/##g"
          exit "${PIPESTATUS[0]}"

      - name: Remove ESLint problem matcher
        if: always()
        run: echo "::remove-matcher owner=eslint-compact::"

      - name: Typecheck
        run: cd app && npx tsc --noEmit

  # Upgrade-safety: applying the current schema on top of the PREVIOUS release's
  # database must not clobber data. The deploy entrypoint uses `prisma db push
  # --accept-data-loss` with no rollback, so a destructive schema change would
  # silently delete production rows. This seeds the old schema and upgrades.
  migration-safety:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ngrid
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ngrid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ngrid" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ngrid:ci@localhost:5432/ngrid
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags to resolve the previous release schema

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install prisma CLI
        run: cd app && npm install --no-audit --no-fund

      - name: Resolve previous release schema
        id: prev
        run: |
          PREV=$(git tag -l 'v*' --sort=-v:refname | grep -vx "${GITHUB_REF_NAME}" | head -1 || true)
          if [ -z "$PREV" ]; then
            echo "No prior release tag — skipping (nothing to upgrade from)."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "Previous release: $PREV"
            git show "$PREV:app/prisma/schema.prisma" > /tmp/old.prisma
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify upgrade preserves data
        if: steps.prev.outputs.skip == '0'
        env:
          OLD_SCHEMA: /tmp/old.prisma
          NEW_SCHEMA: app/prisma/schema.prisma
        run: bash .github/migration-safety/check.sh

  # Boot-health smoke test: build the runner image exactly as it ships, boot it
  # against a throwaway Postgres (the real entrypoint runs `prisma db push`), seed
  # representative data, and assert the app comes up HEALTHY (/api/overview serves
  # real data). Catches a change that breaks startup/DB/queries BEFORE it becomes
  # :edge (staging) or :latest. Runs on PRs + main; gates the publish.
  smoke-boot:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ngrid
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ngrid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ngrid" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ngrid:ci@localhost:5432/ngrid?schema=public
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags so the build can stamp a git-describe version

      - uses: docker/setup-buildx-action@v3

      - name: Build the runner image (as shipped)
        # Stamp the same git-describe version the real edge/main build uses, so the
        # boot-health summary shows a meaningful version (not 0.0.0-dev).
        run: |
          ver="$(git describe --tags --always | sed 's/^v//')"
          docker build --build-arg APP_VERSION="$ver" -t ngrid-dashboard-boot ./app

      - name: Boot the image
        run: |
          docker run -d --name boot --network host \
            -e DATABASE_URL="postgresql://ngrid:ci@localhost:5432/ngrid?schema=public" \
            -e SCHEDULER_ENABLED=false \
            -e NGRID_USER=ci@example.com -e NGRID_PASS=ci \
            ngrid-dashboard-boot

      - name: Wait for the server (entrypoint runs db push, then starts Next)
        run: |
          start=$(date +%s)
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:3000/; then
              waited=$(( $(date +%s) - start ))
              echo "server up after ${waited}s"
              echo "BOOT_WAIT_SECONDS=${waited}" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 3
          done
          echo "BOOT_WAIT_SECONDS=timeout" >> "$GITHUB_ENV"
          echo "::error::server never started (root / not 200)"; docker logs boot | tail -80; exit 1

      - name: Seed representative data
        # Strip the Prisma-only ?schema=public param — libpq/psql rejects it.
        run: psql "${DATABASE_URL%%\?*}" -v ON_ERROR_STOP=1 -f .github/migration-safety/seed.sql

      - name: Assert /api/overview is healthy and serves data
        id: assert
        run: |
          out="$(curl -s -o /tmp/ov.json -m 30 -w '%{http_code} %{time_total}' http://localhost:3000/api/overview)"
          set -- $out; code="$1"; rt="$2"
          echo "HTTP $code (${rt}s)"; cat /tmp/ov.json | head -c 400; echo
          # Stash facts for the step summary (consumed by the always() summary step).
          echo "OV_HTTP_CODE=${code}" >> "$GITHUB_ENV"
          echo "OV_RESPONSE_SECONDS=${rt}" >> "$GITHUB_ENV"
          if [ "$code" != "200" ]; then
            echo "OV_BILL_COUNT=n/a" >> "$GITHUB_ENV"
            echo "::error::/api/overview returned $code (app not healthy)"; docker logs boot | tail -80; exit 1
          fi
          bills="$(python3 -c 'import json;print(json.load(open("/tmp/ov.json")).get("billCount",0))')"
          echo "OV_BILL_COUNT=${bills}" >> "$GITHUB_ENV"
          if [ "${bills:-0}" -lt 1 ]; then
            echo "::error::/api/overview returned 200 but no data (billCount=$bills) — DB/query path unhealthy"; docker logs boot | tail -80; exit 1
          fi
          echo "healthy: /api/overview 200 with billCount=$bills"

      - name: Boot-health summary
        if: always()
        env:
          # steps.assert.outcome is 'success' only if the assert step passed; any
          # earlier failure (build/boot/wait) leaves it '' — treat that as a fail.
          ASSERT_OUTCOME: ${{ steps.assert.outcome }}
        run: |
          # Read the git-describe version stamped into package.json at build (the
          # build step passes --build-arg APP_VERSION; the Dockerfile npm-pkg-sets it
          # and copies package.json into the runner stage). Falls back to "unknown"
          # if the container never came up.
          ver="$(docker exec boot node -p "require('/app/package.json').version" 2>/dev/null || true)"
          [ -n "$ver" ] || ver="unknown"
          if [ "$ASSERT_OUTCOME" = "success" ]; then
            status="✓ healthy"
          else
            status="✗ unhealthy"
          fi
          {
            echo "## Boot-health smoke test"
            echo ""
            echo "**${status}**"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| App version | \`${ver}\` |"
            echo "| \`/api/overview\` HTTP | \`${OV_HTTP_CODE:-n/a}\` |"
            echo "| billCount | \`${OV_BILL_COUNT:-n/a}\` |"
            echo "| Boot wait (s) | \`${BOOT_WAIT_SECONDS:-n/a}\` |"
            echo "| \`/api/overview\` response (s) | \`${OV_RESPONSE_SECONDS:-n/a}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Container logs (always)
        if: always()
        run: docker logs boot 2>&1 | tail -60 || true

      - name: Cleanup
        if: always()
        run: docker rm -f boot || true

  # Pre-migrate-backup coverage: exercise the REAL backup_before_migrate() code path
  # in the deploy entrypoint via its `--pre-migrate-backup-only` hook. The unit tests
  # never run the shell script and migration-safety/check.sh talks to psql directly,
  # so this fail-closed safety net (the only thing standing between a schema change and
  # `prisma db push --accept-data-loss` on a no-rollback prod) had ZERO automated
  # coverage. #83 was a bug living entirely here (a %/@/#/$ char in DB_PASSWORD broke
  # libpq URL parsing and crash-looped the container). This job runs the entrypoint
  # against a Postgres 16 service and asserts every branch behaves.
  #
  # The service password is deliberately set to the #83 special-char value (p%a@s#s$),
  # so EVERY assertion below also doubles as the #83 regression guard: the prisma steps
  # (URL-encoded password in DATABASE_URL) and the discrete-libpq-param steps (raw
  # password in DB_PASSWORD for the probe/pg_dump) must both work with it.
  entrypoint-backup:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ngrid
          # Special chars (%, @, #, $) — the exact class that broke libpq URL parsing
          # in #83. Set once at container start; reused by every assertion below.
          POSTGRES_PASSWORD: p%a@s#s$
          POSTGRES_DB: ngrid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ngrid" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      # DATABASE_URL carries the URL-ENCODED password (prisma's parser uses this);
      # DB_PASSWORD carries it RAW (the backup probe/pg_dump use discrete libpq params,
      # never the URL — that's the #83 fix). %25=% %40=@ %23=# %24=$
      DATABASE_URL: postgresql://ngrid:p%25a%40s%23s%24@localhost:5432/ngrid
      DB_USER: ngrid
      DB_NAME: ngrid
      DB_PASSWORD: p%a@s#s$
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags, in case the schema-delta setup wants prior releases

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Postgres 16 client (psql + pg_dump) from PGDG
        # pg_dump REFUSES to dump a server newer than itself, so the client MUST be
        # >= the postgres:16 service. ubuntu-latest's default postgresql-client can lag
        # a major behind the service image, which would fail with a version-mismatch
        # error mid-backup. Pin to postgresql-client-16 from the official PGDG apt repo
        # to make pg_dump version-skew deterministic (classic CI footgun — see #84).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl ca-certificates gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-16
          echo "psql:    $(psql --version)"
          echo "pg_dump: $(pg_dump --version)"

      - name: Install prisma CLI (app deps)
        # The entrypoint runs `npx prisma migrate diff`/`db push` from app/, so install
        # the app's deps there — same as the migration-safety job.
        run: cd app && npm install --no-audit --no-fund

      - name: Backup dir
        run: echo "BACKUP_DIR=$RUNNER_TEMP/ngrid-backups" >> "$GITHUB_ENV"

      # ── Assertion 1: fresh DB → no dump ────────────────────────────────────────
      - name: "Assert: fresh DB writes no backup"
        run: |
          psql "$DATABASE_URL" -q -c 'DROP SCHEMA public CASCADE; CREATE SCHEMA public;'
          rm -rf "$BACKUP_DIR"; mkdir -p "$BACKUP_DIR"
          set +e
          out="$(cd app && bash docker-entrypoint.sh --pre-migrate-backup-only 2>&1)"; rc=$?
          set -e
          echo "$out"; echo "exit=$rc"
          if [ "$rc" -ne 0 ]; then
            echo "::error::fresh-DB backup hook exited $rc (expected 0)"; exit 1
          fi
          if ! echo "$out" | grep -q "fresh database — no pre-migrate backup needed"; then
            echo "::error::fresh-DB hook did not print the 'fresh database' message"; exit 1
          fi
          if [ -n "$(ls -A "$BACKUP_DIR")" ]; then
            echo "::error::fresh DB produced a backup file but should not have:"; ls -la "$BACKUP_DIR"; exit 1
          fi
          echo "OK: fresh DB → no file, exit 0"

      # ── Assertion 2: populated DB + schema delta → one non-empty *.sql.gz ───────
      - name: "Assert: populated DB with schema delta writes one valid backup"
        run: |
          # Apply the CURRENT schema so all app tables (incl. Account) exist, then seed
          # a representative row so the probe sees a populated DB. Reuse the
          # migration-safety seed rather than inventing a parallel one.
          psql "$DATABASE_URL" -q -c 'DROP SCHEMA public CASCADE; CREATE SCHEMA public;'
          ( cd app && npx prisma db push --skip-generate --accept-data-loss >/dev/null )
          psql "$DATABASE_URL" -q -v ON_ERROR_STOP=1 -f .github/migration-safety/seed.sql >/dev/null
          # Manufacture a GUARANTEED schema delta vs prisma/schema.prisma: add a column
          # the target schema does not have, so `migrate diff` reports a change and the
          # backup branch fires. This is deterministic regardless of tag history —
          # diffing the previous release can be a no-op when the schema is unchanged
          # between releases (it currently is), which would skip the backup. The
          # extra column is dropped by the later db push anyway.
          psql "$DATABASE_URL" -q -c 'ALTER TABLE "Account" ADD COLUMN "ci_extra_col" text;'
          rm -rf "$BACKUP_DIR"; mkdir -p "$BACKUP_DIR"
          set +e
          out="$(cd app && bash docker-entrypoint.sh --pre-migrate-backup-only 2>&1)"; rc=$?
          set -e
          echo "$out"; echo "exit=$rc"
          if [ "$rc" -ne 0 ]; then
            echo "::error::populated-DB backup hook exited $rc (expected 0)"; exit 1
          fi
          if ! echo "$out" | grep -q "schema change detected — backing up"; then
            echo "::error::expected 'schema change detected' branch, got something else"; exit 1
          fi
          count="$(ls -1 "$BACKUP_DIR"/ngrid-pre-migrate-*.sql.gz 2>/dev/null | wc -l)"
          if [ "$count" -ne 1 ]; then
            echo "::error::expected exactly 1 ngrid-pre-migrate-*.sql.gz, found $count"; ls -la "$BACKUP_DIR"; exit 1
          fi
          f="$(ls -1 "$BACKUP_DIR"/ngrid-pre-migrate-*.sql.gz)"
          if [ ! -s "$f" ]; then
            echo "::error::backup file is empty: $f"; exit 1
          fi
          if ! gunzip -t "$f"; then
            echo "::error::backup file is not a valid gzip: $f"; exit 1
          fi
          # The dump must actually contain the seeded data, not just be a valid-but-empty
          # dump (gzip of an empty pg_dump would still pass gunzip -t).
          if ! gunzip -c "$f" | grep -q "ACC-123"; then
            echo "::error::backup does not contain the seeded Account row (ACC-123)"; exit 1
          fi
          echo "OK: one valid, non-empty backup containing seeded data ($(stat -c%s "$f") bytes)"

      # ── Assertion 3 is covered implicitly: the service password is p%a@s#s$, so
      #    assertions 1, 2 and 4 ALL exercise the special-char password — the prisma
      #    URL path (migrate diff/db push) AND the discrete-param path (probe/pg_dump).
      #    A #83-style URL-parsing regression would fail assertion 2 above. Make it
      #    explicit with a dedicated check that re-confirms the special-char dump path.
      - name: "Assert: special-char DB_PASSWORD still backs up (#83 regression guard)"
        run: |
          # Sanity-check the password actually contains the #83 special chars, so this
          # guard can't silently degrade if the service env above is ever changed.
          case "$DB_PASSWORD" in
            *%*@*\#*\$*) : ;;
            *) echo "::error::DB_PASSWORD lost its %/@/#/\$ chars — #83 guard is not testing anything"; exit 1 ;;
          esac
          psql "$DATABASE_URL" -q -c 'DROP SCHEMA public CASCADE; CREATE SCHEMA public;'
          ( cd app && npx prisma db push --skip-generate --accept-data-loss >/dev/null )
          psql "$DATABASE_URL" -q -v ON_ERROR_STOP=1 -f .github/migration-safety/seed.sql >/dev/null
          psql "$DATABASE_URL" -q -c 'ALTER TABLE "Account" ADD COLUMN "ci_extra_col" text;'
          rm -rf "$BACKUP_DIR"; mkdir -p "$BACKUP_DIR"
          set +e
          out="$(cd app && bash docker-entrypoint.sh --pre-migrate-backup-only 2>&1)"; rc=$?
          set -e
          echo "$out"; echo "exit=$rc"
          f="$(ls -1 "$BACKUP_DIR"/ngrid-pre-migrate-*.sql.gz 2>/dev/null | head -1)"
          if [ "$rc" -ne 0 ] || [ -z "$f" ] || [ ! -s "$f" ] || ! gunzip -t "$f"; then
            echo "::error::backup failed with a special-char password (a #83 URL-parsing regression)"; exit 1
          fi
          echo "OK: special-char password ($DB_PASSWORD) backs up cleanly"

      # ── Assertion 4: connect failure → fail closed (locks in #85) ──────────────
      - name: "Assert: bad creds fail closed (exit 1), not silent skip (#85)"
        env:
          # Bad password so the probe can't auth. The runner reaches the service over
          # TCP (localhost:5432), which hits Postgres' scram-sha-256 host rule, so a
          # wrong password is genuinely rejected. DB stays populated from above.
          DATABASE_URL: postgresql://ngrid:wrongpw@localhost:5432/ngrid
          DB_PASSWORD: wrongpw
        run: |
          rm -rf "$BACKUP_DIR"; mkdir -p "$BACKUP_DIR"
          set +e
          out="$(cd app && bash docker-entrypoint.sh --pre-migrate-backup-only 2>&1)"; rc=$?
          set -e
          echo "$out"; echo "exit=$rc"
          if [ "$rc" -eq 0 ]; then
            echo "::error::bad-creds backup hook exited 0 — it must FAIL CLOSED (#85 regression)"; exit 1
          fi
          if ! echo "$out" | grep -q "could not probe the database"; then
            echo "::error::bad-creds hook did not print the fail-closed probe error"; exit 1
          fi
          if [ -n "$(ls -A "$BACKUP_DIR")" ]; then
            echo "::error::bad-creds run wrote a backup file but should have refused"; ls -la "$BACKUP_DIR"; exit 1
          fi
          echo "OK: bad creds → exit $rc, fail-closed error, no file written"

  build-push:
    # Gate the image publish on tests, the upgrade-safety check, the boot-health smoke
    # test, AND the entrypoint backup-path coverage passing. PRs only run the test +
    # migration-safety + smoke-boot + entrypoint-backup jobs above (no publish — no
    # secrets, and forks can't push to GHCR).
    needs: [test, lint, migration-safety, smoke-boot, entrypoint-backup]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags so `git describe` can version edge builds

      - uses: docker/setup-buildx-action@v3

      - name: Resolve app version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            v="${{ github.event.release.tag_name }}"; v="${v#v}"   # release vX.Y.Z -> X.Y.Z
          else
            # main / edge build: git describe from the most recent release tag,
            # e.g. v0.24.0-3-gabc1234 -> 0.24.0-3-gabc1234 (valid npm semver prerelease).
            v="$(git describe --tags --always | sed 's/^v//')"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$v"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ngrid-dashboard
          # Publishing a GitHub Release (tag vX.Y.Z) publishes X.Y.Z, X.Y, X and moves
          # :latest. Pushes to main publish :edge only. Every build gets a :sha-xxxxxxx tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # :latest tracks the newest non-prerelease RELEASE only — never a main/edge build.
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            type=edge,branch=main
            type=sha,format=short
          # Disable the implicit auto-latest; we control :latest explicitly above.
          flavor: |
            latest=false

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
