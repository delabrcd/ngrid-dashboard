# Standalone deployment — all you need is this file + a .env. No clone, no build.
# 1. curl -fsSLO https://raw.githubusercontent.com/delabrcd/ngrid-dashboard/main/docker-compose.yml
# 2. curl -fsSL  https://raw.githubusercontent.com/delabrcd/ngrid-dashboard/main/.env.example -o .env  && edit it
# 3. docker compose up -d   (pulls the prebuilt image from GHCR)
# 4. open http://localhost:3000
# Update later with: docker compose pull && docker compose up -d
# (Developers: build locally with docker-compose.build.yml — see that file.)
services:
  app:
    image: ghcr.io/delabrcd/ember:latest
    container_name: ngrid_dashboard
    restart: unless-stopped
    # All app config (incl. the National Grid password, which may contain $ and #)
    # is injected verbatim via env_file — NOT compose ${} interpolation.
    env_file: .env
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Bill PDFs live on a host dir so you can browse/back them up directly
      # (override the location with PDF_DIR in .env).
      - ${PDF_DIR:-./data/pdfs}:/data/pdfs
      # The session holds live auth tokens — keep it in a Docker-managed volume
      # (root-only on the host, out of your working directory), not a bind mount.
      - session:/data/session
      # Pre-migrate database backups (written before a schema-changing upgrade).
      # Host dir so you can browse/copy them directly (override with BACKUP_DIR).
      - ${BACKUP_DIR:-./data/backups}:/data/backups
    depends_on:
      ngrid_postgres:
        condition: service_healthy
    networks:
      - internal

  ngrid_postgres:
    image: postgres:16
    container_name: ngrid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ngrid}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ngrid}
      TZ: ${TZ:-America/New_York}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ngrid} -d ${DB_NAME:-ngrid}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  pgdata:
  session:

networks:
  internal:
    driver: bridge
